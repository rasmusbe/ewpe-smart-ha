name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ruff (lint)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - name: Run ruff (format check)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
